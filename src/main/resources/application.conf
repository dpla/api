application {
  routes {
    # If ask takes more time than this to complete the request is failed
    askTimeout = 30s
  }
}
akka {
  actor {
    debug {
      # enable DEBUG logging of unhandled messages
      unhandled = on
    }
  }
  http {
    host-connection-pool {
      # Increased from defaults (4/32) to handle burst traffic to ES
      max-connections = 16
      max-connections = ${?AKKA_HTTP_MAX_CONNECTIONS}
      max-open-requests = 128
      max-open-requests = ${?AKKA_HTTP_MAX_OPEN_REQUESTS}
    }
  }
}
dispatchers {
  emailDispatcher {
    type = Dispatcher
    executor = "thread-pool-executor"
    thread-pool-executor {
      core-pool-size = 2
      core-pool-size = ${?EMAIL_MIN_THREADS}
      max-pool-size = 10
      max-pool-size = ${?EMAIL_MAX_THREADS}
    }
    throughput = 1
  }
}
postgres {
  connectionPool = "HikariCP"
  dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
  properties {
    serverName = "localhost"
    serverName = ${?POSTGRES_SERVER}
    portNumber = "5432"
    postNumber = ${?POSTGRES_PORT}
    databaseName = "dplaapi"
    databaseName = ${?POSTGRES_DB}
    user = "dplaapi"
    user = ${?POSTGRES_USER}
    password = "devpassword"
    password = ${?POSTGRES_PASSWORD}
    ssl = true
    ssl = ${?SSL}
    sslmode = "verify-full"
    sslmode = ${?SSL_MODE}
    sslfactory = "org.postgresql.ssl.DefaultJavaSSLFactory"
    sslfactory = ${?SSL_FACTORY}
  }
  numThreads = 10
  numThreads = ${?POSTGRES_THREADS}
}
elasticSearch {
  itemsUrl = ""
  itemsUrl = ${?ITEM_ELASTICSEARCH_URL}
  pssUrl = ""
  pssUrl = ${?PSS_ELASTICSEARCH_URL}
}
awsSes {
  emailFrom  = "info@dp.la"
  emailFrom = ${?EMAIL_FROM}
  region = "us-east-1"
  region = ${?AWS_REGION}
}
s3 {
  smrBucket = ""
  smrBucket = ${?SMR_S3_BUCKET}
}
googleAnalytics {
  trackingId = "UA-XXXXXXXX-X"
  trackingId = ${?GOOGLE_ANALYTICS_ID}
}
